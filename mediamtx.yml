# /etc/cam_motion/mediamtx.yml
# OpenSecurityCam — mediamtx RTSP streaming configuration

###############################################################################
# Network — standard RTSP port so clients need no port suffix
###############################################################################
rtspAddress: :554

###############################################################################
# Logging
###############################################################################
logLevel: warn
logDestinations: [file]
logFile: /var/log/cam_motion/mediamtx.log

###############################################################################
# Disable unused protocols to reduce attack surface and memory use
###############################################################################
hls: no
webrtc: no
srt: no

###############################################################################
# Paths
###############################################################################
paths:

  # Main stream — hardware H.264 via rpicam-vid piped to ffmpeg for RTSP wrapping.
  # mediamtx exec()s runOnInit directly (no shell), so the pipeline lives in cam_stream.sh.
  h264Preview_01_main:
    runOnInit: /usr/local/bin/cam_stream.sh
    runOnInitRestart: true

