# /etc/cam_motion/motion.conf
# OpenSecurityCam — motion daemon configuration

############################################################
# Camera input
############################################################

# CSI camera via libcamera V4L2 compat shim (LD_PRELOAD in service file).
# The shim routes V4L2 ioctls through libcamera so motion sees a standard
# YUV420 stream instead of raw 10-bit Bayer from the unicam node.
video_device /dev/video0

# Resolution and framerate
# OV5647 supported modes: 640x480, 1296x972, 1920x1080, 2592x1944 (all 30 fps)
width 960
height 720
framerate 10
minimum_frame_time 0

############################################################
# Motion detection — tune these for your environment
############################################################

# Number of changed pixels required to trigger motion (lower = more sensitive)
threshold 1700

# Noise filter level (0-255, higher = less sensitive to noise)
noise_level 32

# Consecutive frames with motion required to confirm detection (reduce false triggers)
minimum_motion_frames 2

# Frames to record after motion stops — fills still-period gaps between movements.
# At 10fps, 50 = 5 seconds of coverage after each detection.
post_capture 50

# Seconds of no motion before the current event is closed
event_gap 10

############################################################
# Movie output
############################################################

# Movies are always on when target_dir is set (motion 4.5+)
movie_codec mp4

# Encoding quality 0–100 (lower = smaller file, less CPU).
movie_quality 52

# Disable default 400 kbps bitrate cap — let quality control encoding instead.
# Without this, motion drops frames aggressively to stay within the budget.
movie_bps 0

# Fill still-period gaps with the last detected frame so clip duration matches
# the event window and pauses between movements are visible as frozen frames.
movie_duplicate_frames on

# Filename pattern: timestamp then camera name (motion appends .mp4 automatically)
# CAMERA_NAME is replaced by install.sh using the value from config.toml
movie_filename %Y%m%d-%H%M%S-CAMERA_NAME

# Output directory — must be the NAS mount point
target_dir /mnt/nas/security-cam

# Force a new file every 60 seconds while motion persists
movie_max_time 20

############################################################
# Hooks
############################################################

# Fires immediately when a new clip starts recording (not when it finishes)
# %f = full path to clip file, %t = timestamp string, %v = event number
on_movie_start /usr/local/bin/cam_notifier.sh "%f" "%t" %v

############################################################
# Logging
############################################################

log_file /var/log/cam_motion/motion.log

# 6=notice (recommended), 7=info, 8=debug
log_level 6
